version: "3.8"

services:
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
    command: --interval 300 --cleanup vixenahri-blog

  vixenahri-blog:
    image: ahridocker/my-blog:latest
    container_name: vixenahri-blog
    restart: unless-stopped
    ports:
      - "5177:5177"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@${DB_HOST:-localhost}:${DB_PORT:-5432}/${DB_NAME:-myblog}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:5177}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:5177}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5177
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - ADMIN_ACCESS_KEY=${ADMIN_ACCESS_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - CRON_SECRET=${CRON_SECRET:-}
    network_mode: "host"
    volumes:
      - ./uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5177/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - cloudflare

# Usage
# 1. Copy .env.local.example to .env.local and fill in the values
# 2. Start the main stack: docker compose up -d
# 3. Start with Cloudflare tunnel: docker compose --profile cloudflare up -d
# 4. View logs: docker compose logs -f vixenahri-blog
# 5. Stop the stack: docker compose down
# 6. Initialize the database when needed:
#    docker exec -it vixenahri-blog npm run db:push
#    docker exec -it vixenahri-blog npm run db:seed
